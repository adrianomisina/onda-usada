services:
  - type: web
    name: ondausada
    env: node
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: APP_URL
        sync: false
